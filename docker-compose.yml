# docker-compose.yml
version: "3.9"

services:
  cmdcode-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: cmdcode-server
    restart: unless-stopped
    ports:
      - "${APP_PORT}:${APP_PORT}"
    volumes:
      - ./server:/app
      - cmdcode-data:/data
    environment:
      - JUDGE0_URL=${JUDGE0_URL}
      - APP_PORT=${APP_PORT}
      - DATABASE_URL=sqlite:////data/cmdcode.db
      - CORS_ORIGINS=http://localhost:3000,http://cmdcode-frontend:3000
    networks:
      - judge-net

  cmdcode-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_URL: http://cmdcode-server:${APP_PORT:-8000}
    container_name: cmdcode-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://cmdcode-server:${APP_PORT:-8000}
    depends_on:
      - cmdcode-server
    networks:
      - judge-net

include:
  - ./judge/docker-compose.yml

volumes:
  cmdcode-data:

networks:
  judge-net:
    driver: bridge
