name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 07:00 UTC
    - cron: "0 7 * * 1"

jobs:
  # ---------------------------------------------------------------------------
  # CodeQL — static analysis for Python and JavaScript/TypeScript
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ---------------------------------------------------------------------------
  # Trivy — vulnerability scan on Docker images and the filesystem
  # ---------------------------------------------------------------------------
  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy on repository filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"   # do not block CI; findings appear in Security tab

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

  trivy-image-server:
    name: Trivy server image scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Build server Docker image
        run: docker build -t cmdcode-server:scan ./server

      - name: Run Trivy on server image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: cmdcode-server:scan
          format: sarif
          output: trivy-server.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-server.sarif
          category: trivy-server-image

  trivy-image-frontend:
    name: Trivy frontend image scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend Docker image
        run: docker build -t cmdcode-frontend:scan ./frontend

      - name: Run Trivy on frontend image
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: cmdcode-frontend:scan
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend-image

  # ---------------------------------------------------------------------------
  # pip-audit — Python dependency vulnerability check
  # ---------------------------------------------------------------------------
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Audit server dependencies
        uses: pypa/gh-action-pip-audit@v1
        with:
          inputs: server/requirements.txt

      - name: Audit dev dependencies
        uses: pypa/gh-action-pip-audit@v1
        with:
          inputs: requirements-dev.txt

  # ---------------------------------------------------------------------------
  # npm audit — Node.js dependency vulnerability check
  # ---------------------------------------------------------------------------
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Run npm audit
        working-directory: frontend
        run: npm audit --audit-level=high
