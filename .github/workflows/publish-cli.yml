name: Publish CLI to PyPI

# Trigger by pushing a tag like: git tag cli-v0.2.0 && git push origin cli-v0.2.0
on:
  push:
    tags:
      - "cli-v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi

    # Required for PyPI trusted publishing (OIDC — no API token needed)
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: |
          cd cli
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: cli/dist/
